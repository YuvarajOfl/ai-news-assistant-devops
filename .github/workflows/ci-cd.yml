name: Full CI/CD + Terraform Deploy

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ai-news-assistant
  PYTHON_VERSION: "3.11"
  EC2_USER: ec2-user

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install -r requirements.txt
          pip install flake8

      - run: flake8 app/ --select=E9,F63,F7,F82


  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

          
  terraform:
    runs-on: ubuntu-latest
    needs: build-and-push

    outputs:
      ec2_ip: ${{ steps.get_ip.outputs.ip }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}

      - name: Get EC2 IP
        id: get_ip
        run: |
          IP=$(terraform output -raw ec2_public_ip)
          echo "ip=$IP" >> $GITHUB_OUTPUT
        working-directory: terraform


  wait:
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Wait for EC2 to be ready
        run: |
          echo "Waiting for EC2 instance to initialize..."
          sleep 60


  deploy:
    runs-on: ubuntu-latest
    needs: [terraform, wait]

    steps:
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.secretkey }}" > key.pem
          chmod 400 key.pem

      - name: Deploy to EC2
        run: |
          IP=${{ needs.terraform.outputs.ec2_ip }}

          echo "Connecting to $IP"

          ssh -o StrictHostKeyChecking=no -i key.pem $EC2_USER@$IP "

          echo '🚀 Starting Deployment...'

          # extra wait for safety
          sleep 20

          sudo systemctl start docker

          sudo docker pull ${{ env.IMAGE_NAME }}:latest

          sudo docker stop ai-news-app || true
          sudo docker rm ai-news-app || true

          sudo docker run -d \
            --name ai-news-app \
            -p 80:8501 \
            ${{ env.IMAGE_NAME }}:latest

          echo '✅ Deployment Done!'
          "


  summary:
    runs-on: ubuntu-latest
    needs: [test, build-and-push, terraform, deploy]
    if: always()

    steps:
      - run: |
          echo "## 🚀 CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Build | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Terraform | ${{ needs.terraform.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
